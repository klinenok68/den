<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Аэрохоккей — Три Кота</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, Arial, sans-serif;
            padding: 15px;
        }
        
        .game-wrapper {
            background: #2b1e0f;
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        
        .screen {
            background: #fef7e0;
            border-radius: 48px;
            text-align: center;
            overflow: hidden;
            min-width: 600px;
            max-width: 95vw;
        }
        
        .main-menu {
            padding: 40px 30px;
        }
        
        .main-menu h1 {
            font-size: 3rem;
            color: #c97e2c;
            margin: 0 0 10px;
            text-shadow: 4px 4px 0 #ffd966;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .menu-btn {
            background: #7cba6e;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            width: 250px;
            margin: 0 auto;
            box-shadow: 0 5px 0 #3f6b32;
        }
        
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3f6b32; }
        
        .admin-panel-btn {
            background: #a05a2a;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .admin-panel {
            background: #2c1a0a;
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }
        
        .admin-panel.show { display: block; }
        
        .admin-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .admin-action-btn {
            background: #7cba6e;
            border: none;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }
        
        .stats-panel {
            background: #f5bc70;
            border-radius: 30px;
            padding: 10px;
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
        }
        
        .stat-item { font-weight: bold; color: #482c12; }
        
        .difficulty-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        
        .difficulty-btn {
            background: #e0c080;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 30px;
            color: #482c12;
            cursor: pointer;
        }
        
        .difficulty-btn.active { background: #7cba6e; color: white; }
        
        .chars-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 0 15px;
        }
        
        .char {
            background: #fae5b3;
            border-radius: 35px;
            padding: 12px 10px;
            cursor: pointer;
            border: 3px solid #e7bc7e;
        }
        
        .char.selected { border: 4px solid #f3b33d; background: #ffe3b2; transform: scale(1.02); }
        
        .char-avatar { font-size: 3rem; }
        .char-name { font-size: 1rem; font-weight: bold; margin-top: 6px; color: #6b3a1c; }
        .char-rating { font-size: 0.8rem; color: #c97e2c; background: #2c1a0a; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-top: 5px; font-weight: bold; }
        
        .back-btn {
            background: #e0a060;
            border: none;
            font-size: 1rem;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .game-screen {
            position: relative;
            width: 550px;
            height: 800px;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1f6e43;
            cursor: none;
        }
        
        .score-panel {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 10;
        }
        
        .score-box {
            background: rgba(0,0,0,0.7);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff9e0;
            font-family: monospace;
        }
        
        .player-info { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 50px; color: #fff9e0; }
        
        .game-buttons {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 20;
        }
        
        .kick-btn, .exit-btn {
            background: rgba(0,0,0,0.8);
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .kick-btn { background: rgba(100,150,200,0.9); }
        .exit-btn { background: rgba(220,80,60,0.9); }
        
        .result-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 20px 30px;
            border-radius: 50px;
            text-align: center;
            z-index: 30;
            display: none;
            flex-direction: column;
            gap: 12px;
            border: 2px solid gold;
        }
        
        .result-text { font-size: 1.3rem; font-weight: bold; color: white; }
        
        .controls-info {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.6rem;
            color: #ffefb0;
            background: rgba(0,0,0,0.5);
            width: fit-content;
            margin: 0 auto;
            padding: 3px 10px;
            border-radius: 20px;
            pointer-events: none;
        }
        
        .goal-flash {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255,215,0,0.5) 0%, rgba(255,215,0,0) 70%);
            pointer-events: none;
            animation: flash 0.5s ease-out;
        }
        
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .shop-screen, .titles-screen, .glory-screen {
            padding: 30px 20px;
        }
        
        .shop-items, .titles-items {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
        }
        
        .shop-item, .title-item {
            background: #fae5b3;
            border-radius: 30px;
            padding: 20px;
            width: 200px;
            border: 3px solid #e7bc7e;
        }
        
        @media (max-width: 600px) {
            .game-screen { width: 95vw; height: 135vw; }
            .score-box { padding: 3px 12px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Главное меню -->
    <div id="mainMenu" class="screen main-menu">
        <h1>🍭 AIR HOCKEY 🍬</h1>
        <div class="stats-panel">
            <div class="stat-item">💰 МОНЕТЫ: <span id="coinsDisplay">0</span></div>
            <div class="stat-item">⭐ ОБЩЕЕ ЭЛО: <span id="totalEloDisplay">0</span></div>
        </div>
        <div class="menu-buttons">
            <button id="startMenuBtn" class="menu-btn">⚡ СТАРТ</button>
            <button id="shopMenuBtn" class="menu-btn">🛒 МАГАЗИН</button>
            <button id="titlesMenuBtn" class="menu-btn">🏆 ТИТУЛЫ</button>
            <button id="gloryMenuBtn" class="menu-btn">✨ ПУТЬ К СЛАВЕ</button>
            <button id="adminPanelBtn" class="admin-panel-btn">🔧 АДМИН-ПАНЕЛЬ</button>
        </div>
        <div id="adminPanel" class="admin-panel">
            <div class="admin-title">⚡ АДМИН-ПАНЕЛЬ ⚡</div>
            <div class="admin-buttons">
                <button id="adminPlus100Elo" class="admin-action-btn">+100 ЭЛО</button>
                <button id="adminPlus500Elo" class="admin-action-btn">+500 ЭЛО</button>
                <button id="adminMinusElo" class="admin-action-btn">-100 ЭЛО</button>
                <button id="adminPlusCoins" class="admin-action-btn">+100 МОНЕТ</button>
                <button id="adminSafeExit" class="admin-action-btn">🔓 БЕЗОПАСНЫЙ ВЫХОД</button>
            </div>
            <button id="adminCloseBtn" class="admin-exit-btn" style="background:#c06040; padding:5px 15px; border-radius:30px; margin-top:10px;">🚪 ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- Выбор персонажа -->
    <div id="charScreen" class="screen" style="display: none; padding: 20px;">
        <h2>✨ ВЫБЕРИ БОЙЦА ✨</h2>
        <div class="difficulty-buttons">
            <button id="easyBtn" class="difficulty-btn">🟢 ЛЕГКИЙ</button>
            <button id="mediumBtn" class="difficulty-btn active">🟡 СРЕДНИЙ</button>
            <button id="hardBtn" class="difficulty-btn">🔴 ТРУДНЫЙ</button>
        </div>
        <div class="chars-grid" id="charsGrid"></div>
        <button id="backToMainBtn" class="back-btn">🏠 В ГЛАВНОЕ МЕНЮ</button>
        <button id="startGameBtn" class="menu-btn" style="margin-top: 15px;">⚡ НАЧАТЬ ИГРУ</button>
    </div>

    <!-- Магазин -->
    <div id="shopScreen" class="screen" style="display: none; padding: 20px;">
        <h2>🛒 МАГАЗИН 🛒</h2>
        <div class="shop-items" id="shopItems"></div>
        <button id="backFromShopBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <!-- Титулы -->
    <div id="titlesScreen" class="screen" style="display: none; padding: 20px;">
        <h2>🏆 ТИТУЛЫ 🏆</h2>
        <div class="shop-items" id="titlesItems"></div>
        <button id="backFromTitlesBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <!-- Путь к славе -->
    <div id="gloryScreen" class="screen" style="display: none; padding: 20px;">
        <h2>✨ ПУТЬ К СЛАВЕ ✨</h2>
        <div style="font-size: 2rem; margin: 20px;">⭐ <span id="gloryElo">0</span> ЭЛО</div>
        <div style="font-size: 1.5rem;">💰 ДОСТУПНО МОНЕТ: <span id="gloryCoins">0</span></div>
        <button id="collectCoinsBtn" class="menu-btn" style="margin: 15px auto;">💰 ЗАБРАТЬ МОНЕТЫ</button>
        <button id="backFromGloryBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <!-- Игра -->
    <div id="gameScreen" class="screen game-screen" style="display: none;">
        <div class="score-panel">
            <div class="score-box" id="playerScore">0</div>
            <div class="player-info" id="playerName"></div>
            <div class="player-info" id="botName"></div>
            <div class="score-box" id="botScore">0</div>
        </div>
        <canvas id="gameCanvas" width="550" height="800"></canvas>
        <div class="game-buttons">
            <button id="kickBtn" class="kick-btn">⚡ ПИНОК (R)</button>
            <button id="exitGameBtn" class="exit-btn">🏳️ СДАТЬСЯ (F)</button>
        </div>
        <div class="controls-info">🏒 УПРАВЛЕНИЕ: МЫШКА / WASD / СТРЕЛКИ | R - ПИНОК | F - СДАТЬСЯ</div>
        <div id="resultPanel" class="result-panel">
            <div id="resultText" class="result-text"></div>
            <button id="nextBtn" class="menu-btn" style="margin-top: 10px;">✨ В ГЛАВНОЕ МЕНЮ ✨</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== ПЕРСОНАЖИ ====================
        const CHARACTERS = [
            { name: "КОРЖИК", emoji: "🐱", color: "#6CA6CD" },
            { name: "КОМПОТ", emoji: "🐱", color: "#6B8E23" },
            { name: "ГОНЯ", emoji: "🐱", color: "#808080" },
            { name: "КАРАМЕЛЬКА", emoji: "🐱", color: "#CD5C5C" }
        ];
        
        let ratings = {0: 0, 1: 0, 2: 0, 3: 0};
        let ownedTitles = [];
        let activeTitle = null;
        let coins = 0;
        let selectedChar = 0;
        let botChar = 0;
        let difficulty = 'medium';
        let safeExitUnlocked = false;
        
        function loadData() {
            const saved = localStorage.getItem('airhockey_full');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    ratings = data.ratings || {0:0,1:0,2:0,3:0};
                    ownedTitles = data.ownedTitles || [];
                    activeTitle = data.activeTitle || null;
                    coins = data.coins || 0;
                    safeExitUnlocked = data.safeExitUnlocked || false;
                } catch(e) {}
            }
            updateStats();
        }
        
        function saveData() {
            localStorage.setItem('airhockey_full', JSON.stringify({
                ratings, ownedTitles, activeTitle, coins, safeExitUnlocked
            }));
        }
        
        function updateStats() {
            const total = ratings[0] + ratings[1] + ratings[2] + ratings[3];
            document.getElementById('coinsDisplay').innerText = coins;
            document.getElementById('totalEloDisplay').innerText = total;
            document.getElementById('gloryElo').innerText = total;
            document.getElementById('gloryCoins').innerText = Math.floor(total / 50) - coins;
        }
        
        function collectCoins() {
            const total = ratings[0] + ratings[1] + ratings[2] + ratings[3];
            const earned = Math.floor(total / 50);
            const available = earned - coins;
            if (available > 0) {
                coins += available;
                saveData();
                updateStats();
                alert(`💰 Вы забрали ${available} монет!`);
            } else {
                alert("Нет доступных монет!");
            }
        }
        
        // ==================== ОТРИСОВКА ПЕРСОНАЖА ====================
        function drawCharacter(ctx, x, y, color) {
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x - 12, y - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 12, y - 8, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(x - 12, y - 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 12, y - 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#E87A5C";
            ctx.beginPath();
            ctx.ellipse(x, y + 5, 6, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function renderCharacters() {
            const grid = document.getElementById('charsGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const div = document.createElement('div');
                div.className = 'char' + (i === selectedChar ? ' selected' : '');
                div.innerHTML = `
                    <div class="char-avatar">${CHARACTERS[i].emoji}</div>
                    <div class="char-name">${CHARACTERS[i].name}</div>
                    <div class="char-rating">⭐ ЭЛО: ${ratings[i]}</div>
                `;
                div.onclick = () => { selectedChar = i; renderCharacters(); };
                grid.appendChild(div);
            }
        }
        
        function renderShop() {
            const container = document.getElementById('shopItems');
            const primeOwned = ownedTitles.includes('prime');
            container.innerHTML = `
                <div class="shop-item ${primeOwned ? 'owned' : ''}">
                    <div style="font-size: 3rem;">🏆</div>
                    <div><strong>ТИТУЛ "НАСТОЯЩИЙ ЧЕМПИОН"</strong></div>
                    <div>+5 ЭЛО за гол, -5 ЭЛО за пропущенный</div>
                    <div>💰 75 МОНЕТ</div>
                    ${primeOwned ? '<div>✅ КУПЛЕНО</div>' : '<button id="buyPrimeBtn" class="menu-btn" style="font-size:0.8rem; padding:5px 10px;">КУПИТЬ</button>'}
                </div>
            `;
            const buyBtn = document.getElementById('buyPrimeBtn');
            if (buyBtn) {
                buyBtn.onclick = () => {
                    if (coins >= 75 && !ownedTitles.includes('prime')) {
                        coins -= 75;
                        ownedTitles.push('prime');
                        saveData();
                        updateStats();
                        renderShop();
                        renderTitles();
                        alert('🎉 Титул куплен!');
                    } else alert('Недостаточно монет!');
                };
            }
        }
        
        function renderTitles() {
            const container = document.getElementById('titlesItems');
            if (ownedTitles.length === 0) {
                container.innerHTML = '<div style="padding:20px;">😢 Нет титулов</div>';
                return;
            }
            container.innerHTML = ownedTitles.map(title => `
                <div class="shop-item ${activeTitle === title ? 'active-title' : ''}">
                    <div style="font-size: 3rem;">🏆</div>
                    <div><strong>${title === 'prime' ? 'НАСТОЯЩИЙ ЧЕМПИОН' : title}</strong></div>
                    <div>${title === 'prime' ? '+5 ЭЛО за гол, -5 ЭЛО за пропущенный' : ''}</div>
                    <button class="apply-title-btn menu-btn" style="font-size:0.8rem; padding:5px 10px;">${activeTitle === title ? '✅ АКТИВЕН' : '🔹 ПРИМЕНИТЬ'}</button>
                </div>
            `).join('');
            document.querySelectorAll('.apply-title-btn').forEach((btn, i) => {
                btn.onclick = () => {
                    activeTitle = ownedTitles[i];
                    saveData();
                    renderTitles();
                    alert('Титул активирован!');
                };
            });
        }
        
        // ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
        let playerScore = 0, botScore = 0;
        let gameActive = false;
        let animationId = null;
        
        const W = 550, H = 800;
        const PADDLE_R = 28;
        const PUCK_R = 16;
        const GOAL_WIDTH = 180;
        const TOP_GOAL_X = (W - GOAL_WIDTH) / 2;
        const BOTTOM_GOAL_X = (W - GOAL_WIDTH) / 2;
        
        const PLAYER_AREA = { minX: 25 + PADDLE_R, maxX: W - 25 - PADDLE_R, minY: H/2 + 30, maxY: H - 30 };
        const BOT_AREA = { minX: 25 + PADDLE_R, maxX: W - 25 - PADDLE_R, minY: 30, maxY: H/2 - 30 };
        
        let playerPaddle = { x: W/2, y: H - 80 };
        let botPaddle = { x: W/2, y: 80 };
        let mouseX = W/2, mouseY = H - 80;
        let puck = { x: W/2, y: H/2, vx: 0, vy: 0 };
        
        let botSpeed = 0.09;
        let botError = 0.05;
        
        let lastTimestamp = 0;
        let deltaTime = 1 / 60;
        
        let keys = { w: false, s: false, a: false, d: false };
        
        function setDifficulty(level) {
            difficulty = level;
            if (level === 'easy') { botSpeed = 0.045; botError = 0.25; }
            else if (level === 'medium') { botSpeed = 0.09; botError = 0.05; }
            else { botSpeed = 0.14; botError = 0; }
        }
        
        function startGame() {
            let available = [0,1,2,3].filter(i => i !== selectedChar);
            botChar = available[Math.floor(Math.random() * available.length)];
            playerScore = 0; botScore = 0;
            document.getElementById('playerScore').innerText = "0";
            document.getElementById('botScore').innerText = "0";
            document.getElementById('playerName').innerHTML = CHARACTERS[selectedChar].name;
            document.getElementById('botName').innerHTML = CHARACTERS[botChar].name;
            
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('charScreen').style.display = 'none';
            gameActive = true;
            
            puck.x = W/2; puck.y = H/2;
            puck.vx = (Math.random() - 0.5) * 4;
            puck.vy = (Math.random() - 0.5) * 4;
            playerPaddle.x = W/2; playerPaddle.y = H - 80;
            botPaddle.x = W/2; botPaddle.y = 80;
            mouseX = W/2; mouseY = H - 80;
            lastTimestamp = 0;
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function endGame() {
            gameActive = false;
            if (animationId) cancelAnimationFrame(animationId);
            
            let diff = playerScore - botScore;
            let gain = diff * (difficulty === 'easy' ? 10 : difficulty === 'medium' ? 20 : 30);
            ratings[selectedChar] += gain;
            saveData();
            updateStats();
            
            let msg = playerScore > botScore ? '🏆 ПОБЕДА! 🏆' : (playerScore < botScore ? '😭 ПОРАЖЕНИЕ... 😭' : '🤝 НИЧЬЯ 🤝');
            document.getElementById('resultText').innerHTML = `${msg}<br>${playerScore} : ${botScore}<br>${gain >= 0 ? '+' : ''}${gain} ЭЛО`;
            document.getElementById('resultPanel').style.display = 'flex';
        }
        
        function scoreGoal(who) {
            if (!gameActive) return;
            if (who === 'player') playerScore++;
            else botScore++;
            document.getElementById('playerScore').innerText = playerScore;
            document.getElementById('botScore').innerText = botScore;
            
            if (playerScore >= 5 || botScore >= 5) { endGame(); return; }
            
            const flash = document.createElement('div');
            flash.className = 'goal-flash';
            document.getElementById('gameScreen').appendChild(flash);
            setTimeout(() => flash.remove(), 500);
            
            puck.x = W/2; puck.y = H/2;
            puck.vx = (Math.random() - 0.5) * 4;
            puck.vy = (Math.random() - 0.5) * 4;
        }
        
        function updateBot(dt) {
            if (!gameActive) return;
            let targetX = puck.x, targetY = puck.y;
            targetX = Math.max(BOT_AREA.minX + 15, Math.min(BOT_AREA.maxX - 15, targetX));
            targetY = Math.max(BOT_AREA.minY + 15, Math.min(BOT_AREA.maxY - 15, targetY));
            let dx = targetX - botPaddle.x, dy = targetY - botPaddle.y;
            if (Math.random() < botError) { dx *= 0.6; dy *= 0.6; }
            botPaddle.x += Math.min(6, Math.max(-6, dx * botSpeed * (dt * 60)));
            botPaddle.y += Math.min(6, Math.max(-6, dy * botSpeed * (dt * 60)));
            botPaddle.x = Math.max(BOT_AREA.minX, Math.min(BOT_AREA.maxX, botPaddle.x));
            botPaddle.y = Math.max(BOT_AREA.minY, Math.min(BOT_AREA.maxY, botPaddle.y));
        }
        
        function updateKeyboardMovement() {
            let speed = 7;
            if (keys.w) mouseY -= speed;
            if (keys.s) mouseY += speed;
            if (keys.a) mouseX -= speed;
            if (keys.d) mouseX += speed;
            mouseX = Math.max(PLAYER_AREA.minX, Math.min(PLAYER_AREA.maxX, mouseX));
            mouseY = Math.max(PLAYER_AREA.minY, Math.min(PLAYER_AREA.maxY, mouseY));
        }
        
        function updatePhysics(dt) {
            if (!gameActive) return;
            puck.x += puck.vx * dt * 60;
            puck.y += puck.vy * dt * 60;
            
            if (puck.x - PUCK_R <= 0) { puck.x = PUCK_R; puck.vx = -puck.vx; }
            if (puck.x + PUCK_R >= W) { puck.x = W - PUCK_R; puck.vx = -puck.vx; }
            
            if (puck.y - PUCK_R <= 0) {
                if (puck.x >= TOP_GOAL_X && puck.x <= TOP_GOAL_X + GOAL_WIDTH) { scoreGoal('player'); return; }
                else { puck.y = PUCK_R; puck.vy = -puck.vy; }
            }
            if (puck.y + PUCK_R >= H) {
                if (puck.x >= BOTTOM_GOAL_X && puck.x <= BOTTOM_GOAL_X + GOAL_WIDTH) { scoreGoal('bot'); return; }
                else { puck.y = H - PUCK_R; puck.vy = -puck.vy; }
            }
            
            const dx1 = puck.x - playerPaddle.x, dy1 = puck.y - playerPaddle.y;
            if (Math.hypot(dx1, dy1) < PUCK_R + PADDLE_R) {
                const angle = Math.atan2(dy1, dx1);
                const speed = Math.hypot(puck.vx, puck.vy);
                const newSpeed = Math.min(12, speed + 1.5);
                puck.vx = Math.cos(angle) * newSpeed * 1.2;
                puck.vy = Math.sin(angle) * newSpeed * 1.2;
                const overlap = (PUCK_R + PADDLE_R) - Math.hypot(dx1, dy1);
                puck.x += Math.cos(angle) * overlap;
                puck.y += Math.sin(angle) * overlap;
            }
            
            const dx2 = puck.x - botPaddle.x, dy2 = puck.y - botPaddle.y;
            if (Math.hypot(dx2, dy2) < PUCK_R + PADDLE_R) {
                const angle = Math.atan2(dy2, dx2);
                const speed = Math.hypot(puck.vx, puck.vy);
                const newSpeed = Math.min(12, speed + 1.5);
                puck.vx = Math.cos(angle) * newSpeed * 1.2;
                puck.vy = Math.sin(angle) * newSpeed * 1.2;
                const overlap = (PUCK_R + PADDLE_R) - Math.hypot(dx2, dy2);
                puck.x += Math.cos(angle) * overlap;
                puck.y += Math.sin(angle) * overlap;
            }
            
            puck.x = Math.max(PUCK_R, Math.min(W - PUCK_R, puck.x));
            puck.y = Math.max(PUCK_R, Math.min(H - PUCK_R, puck.y));
            playerPaddle.x = mouseX;
            playerPaddle.y = mouseY;
            playerPaddle.x = Math.max(PLAYER_AREA.minX, Math.min(PLAYER_AREA.maxX, playerPaddle.x));
            playerPaddle.y = Math.max(PLAYER_AREA.minY, Math.min(PLAYER_AREA.maxY, playerPaddle.y));
        }
        
        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = "#208a5e";
            ctx.fillRect(0, 0, W, H);
            
            ctx.beginPath();
            ctx.strokeStyle = "#ffefb0";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 15]);
            ctx.moveTo(0, H/2);
            ctx.lineTo(W, H/2);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.beginPath();
            ctx.arc(W/2, H/2, 45, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = "#4a2c14cc";
            ctx.fillRect(TOP_GOAL_X, 0, GOAL_WIDTH, 18);
            ctx.fillStyle = "#e6bc7e";
            ctx.fillRect(TOP_GOAL_X + 5, 2, GOAL_WIDTH - 10, 12);
            ctx.fillStyle = "#4a2c14cc";
            ctx.fillRect(BOTTOM_GOAL_X, H - 18, GOAL_WIDTH, 18);
            ctx.fillStyle = "#e6bc7e";
            ctx.fillRect(BOTTOM_GOAL_X + 5, H - 16, GOAL_WIDTH - 10, 12);
            
            drawCharacter(ctx, playerPaddle.x, playerPaddle.y, CHARACTERS[selectedChar].color);
            drawCharacter(ctx, botPaddle.x, botPaddle.y, CHARACTERS[botChar].color);
            
            ctx.beginPath();
            ctx.arc(puck.x, puck.y, PUCK_R, 0, Math.PI * 2);
            ctx.fillStyle = "#2d2d2d";
            ctx.fill();
            ctx.fillStyle = "#c0c0c0";
            ctx.beginPath();
            ctx.arc(puck.x - 4, puck.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function gameLoop(timestamp) {
            if (!gameActive) { draw(); return; }
            if (lastTimestamp === 0) lastTimestamp = timestamp;
            let dt = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
            lastTimestamp = timestamp;
            if (dt < 0.005) dt = 0.016;
            
            updateKeyboardMovement();
            updateBot(dt);
            updatePhysics(dt);
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function handleMouseMove(e) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            let y = ((e.touches ? e.touches[0].clientY : e.clientY) - rect.top) * (canvas.height / rect.height);
            let x = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) * (canvas.width / rect.width);
            mouseX = Math.max(PLAYER_AREA.minX, Math.min(PLAYER_AREA.maxX, x));
            mouseY = Math.max(PLAYER_AREA.minY, Math.min(PLAYER_AREA.maxY, y));
            if (e.touches) e.preventDefault();
        }
        
        function kickReset() { if (gameActive) { puck.x = W/2; puck.y = H/2; puck.vx = (Math.random()-0.5)*5; puck.vy = (Math.random()-0.5)*5; } }
        
        function handleKeyDown(e) {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = true;
            if (key === 's' || key === 'arrowdown') keys.s = true;
            if (key === 'a' || key === 'arrowleft') keys.a = true;
            if (key === 'd' || key === 'arrowright') keys.d = true;
            if (key === 'r') { kickReset(); e.preventDefault(); }
            if (key === 'f') { if (gameActive) endGame(); e.preventDefault(); }
        }
        
        function handleKeyUp(e) {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = false;
            if (key === 's' || key === 'arrowdown') keys.s = false;
            if (key === 'a' || key === 'arrowleft') keys.a = false;
            if (key === 'd' || key === 'arrowright') keys.d = false;
        }
        
        // ==================== НАВИГАЦИЯ ====================
        document.getElementById('startMenuBtn').onclick = () => {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('charScreen').style.display = 'block';
            renderCharacters();
        };
        
        document.getElementById('shopMenuBtn').onclick = () => {

            document.getElementById('shopScreen').style.display = 'block';
            renderShop();
        };
        
        document.getElementById('titlesMenuBtn').onclick = () => {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('titlesScreen').style.display = 'block';
            renderTitles();
        };
        
        document.getElementById('gloryMenuBtn').onclick = () => {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gloryScreen').style.display = 'block';
            updateStats();
        };
        
        document.getElementById('backToMainBtn').onclick = () => {
            document.getElementById('charScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        };
        
        document.getElementById('backFromShopBtn').onclick = () => {
            document.getElementById('shopScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        };
        
        document.getElementById('backFromTitlesBtn').onclick = () => {
            document.getElementById('titlesScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        };
        
        document.getElementById('backFromGloryBtn').onclick = () => {
            document.getElementById('gloryScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        };
        
        document.getElementById('collectCoinsBtn').onclick = collectCoins;
        document.getElementById('startGameBtn').onclick = startGame;
        document.getElementById('kickBtn').onclick = kickReset;
        document.getElementById('exitGameBtn').onclick = () => { if (gameActive) endGame(); };
        document.getElementById('nextBtn').onclick = () => {
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            updateStats();
        };
        
        document.getElementById('easyBtn').onclick = () => {
            setDifficulty('easy');
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('easyBtn').classList.add('active');
        };
        document.getElementById('mediumBtn').onclick = () => {
            setDifficulty('medium');
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mediumBtn').classList.add('active');
        };
        document.getElementById('hardBtn').onclick = () => {
            setDifficulty('hard');
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('hardBtn').classList.add('active');
        };
        
        // Админ-панель
        document.getElementById('adminPanelBtn').onclick = () => {
            document.getElementById('adminPanel').classList.toggle('show');
        };
        document.getElementById('adminCloseBtn').onclick = () => {
            document.getElementById('adminPanel').classList.remove('show');
        };
        document.getElementById('adminPlus100Elo').onclick = () => {
            ratings[selectedChar] += 100;
            if (ratings[selectedChar] > 3000) ratings[selectedChar] = 3000;
            saveData();
            updateStats();
            renderCharacters();
            alert('+100 ЭЛО');
        };
        document.getElementById('adminPlus500Elo').onclick = () => {
            ratings[selectedChar] += 500;
            if (ratings[selectedChar] > 3000) ratings[selectedChar] = 3000;
            saveData();
            updateStats();
            renderCharacters();
            alert('+500 ЭЛО');
        };
        document.getElementById('adminMinusElo').onclick = () => {
            ratings[selectedChar] -= 100;
            if (ratings[selectedChar] < 0) ratings[selectedChar] = 0;
            saveData();
            updateStats();
            renderCharacters();
            alert('-100 ЭЛО');
        };
        document.getElementById('adminPlusCoins').onclick = () => {
            coins += 100;
            saveData();
            updateStats();
            alert('+100 МОНЕТ');
        };
        document.getElementById('adminSafeExit').onclick = () => {
            safeExitUnlocked = true;
            saveData();
            alert('Безопасный выход разблокирован');
        };
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('touchmove', handleMouseMove, { passive: false });
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        loadData();
        renderCharacters();
        setDifficulty('medium');
        document.getElementById('mainMenu').style.display = 'block';
    })();
</script>
