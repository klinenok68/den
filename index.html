<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Аэрохоккей — Три Кота + Горчица</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%); display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .game-wrapper { background: #2b1e0f; border-radius: 60px; padding: 20px; box-shadow: 0 25px 40px rgba(0,0,0,0.5); }
        .screen { background: #fef7e0; border-radius: 48px; text-align: center; overflow: hidden; min-width: 600px; max-width: 95vw; }
        .main-menu { padding: 40px 30px; }
        .main-menu h1 { font-size: 3rem; color: #c97e2c; margin: 0 0 10px; text-shadow: 4px 4px 0 #ffd966; }
        .prestige-badge { background: gold; color: #2c1a0a; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-left: 8px; display: inline-block; }
        .stats-panel { background: #f5bc70; border-radius: 30px; padding: 10px; margin-top: 20px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stat-item { font-weight: bold; color: #482c12; display: flex; align-items: center; gap: 5px; }
        .mode-buttons { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .mode-btn { background: #e0c080; border: none; font-size: 0.9rem; font-weight: bold; padding: 6px 20px; border-radius: 30px; color: #482c12; cursor: pointer; }
        .mode-btn.active { background: #7cba6e; color: white; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .menu-btn { background: #7cba6e; border: none; font-size: 1.3rem; font-weight: bold; padding: 12px 30px; border-radius: 50px; color: white; cursor: pointer; width: 250px; margin: 0 auto; box-shadow: 0 5px 0 #3f6b32; }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3f6b32; }
        .reset-stats-btn { background: #e0a060; border: none; font-size: 1rem; font-weight: bold; padding: 10px 25px; border-radius: 40px; color: white; cursor: pointer; margin-top: 10px; box-shadow: 0 3px 0 #a06030; }
        .admin-panel-btn { background: #a05a2a; border: none; font-size: 1rem; font-weight: bold; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; margin-top: 10px; }
        .admin-panel { background: #2c1a0a; border-radius: 30px; padding: 15px; margin: 15px 0; display: none; }
        .admin-panel.show { display: block; }
        .difficulty-buttons { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .difficulty-btn { background: #e0c080; border: none; font-size: 0.9rem; font-weight: bold; padding: 6px 20px; border-radius: 30px; color: #482c12; cursor: pointer; }
        .difficulty-btn.active { background: #7cba6e; color: white; }
        .chars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; padding: 0 15px; }
        .char { background: #fae5b3; border-radius: 30px; padding: 10px 8px; cursor: pointer; border: 3px solid #e7bc7e; transition: all 0.2s; }
        .char.selected { border: 4px solid #f3b33d; background: #ffe3b2; transform: scale(1.02); }
        .char.locked { filter: grayscale(0.7); opacity: 0.6; cursor: not-allowed; }
        .char-name { font-size: 0.9rem; font-weight: bold; margin-top: 4px; color: #6b3a1c; }
        .char-rating { font-size: 0.7rem; color: #c97e2c; background: #2c1a0a; display: inline-block; padding: 2px 6px; border-radius: 15px; margin-top: 4px; font-weight: bold; }
        .char-buff { font-size: 0.65rem; color: #7cba6e; margin-top: 3px; line-height: 1.2; }
        .char-elo-info { font-size: 0.65rem; color: #ffaa66; margin-top: 2px; }
        .back-btn { background: #e0a060; border: none; font-size: 1rem; padding: 8px 25px; border-radius: 40px; color: white; cursor: pointer; margin-top: 20px; }
        .game-screen { position: relative; width: 650px; height: 850px; }
        canvas { display: block; width: 100%; height: 100%; background: #1f6e43; cursor: none; }
        .score-panel { position: absolute; top: 15px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.7); padding: 6px 18px; border-radius: 50px; font-size: 1.8rem; font-weight: bold; color: #fff9e0; font-family: monospace; }
        .player-info { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 50px; color: #fff9e0; display: flex; flex-direction: column; align-items: center; }
        .controls-info { position: absolute; bottom: 15px; left: 0; right: 0; text-align: center; font-size: 0.65rem; color: #ffefb0; background: rgba(0,0,0,0.6); width: fit-content; margin: 0 auto; padding: 4px 12px; border-radius: 20px; pointer-events: none; z-index: 15; }
        .game-buttons { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 20; }
        .kick-btn, .exit-btn, .safe-exit-btn { background: rgba(0,0,0,0.8); border: none; padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .kick-btn { background: rgba(100,150,200,0.9); }
        .exit-btn { background: rgba(220,80,60,0.9); }
        .safe-exit-btn { background: rgba(80,180,80,0.9); }
        .result-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 20px 30px; border-radius: 50px; text-align: center; z-index: 30; display: none; flex-direction: column; gap: 12px; border: 2px solid gold; min-width: 320px; }
        .result-text { font-size: 1.3rem; font-weight: bold; color: white; }
        .goal-flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, rgba(255,215,0,0.5) 0%, rgba(255,215,0,0) 70%); pointer-events: none; animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
        .collect-btn { background: #7cba6e; border: none; font-size: 1.2rem; font-weight: bold; padding: 10px 25px; border-radius: 50px; color: white; cursor: pointer; margin: 15px auto; }
        .shop-items, .titles-items { display: flex; justify-content: center; gap: 30px; margin: 20px; flex-wrap: wrap; }
        .shop-item { background: #fae5b3; border-radius: 30px; padding: 20px; width: 260px; border: 3px solid #e7bc7e; }
        @media (max-width: 700px) { .screen { min-width: 95vw; } .game-screen { width: 95vw; height: 124vw; } .controls-info { font-size: 0.55rem; bottom: 10px; } .game-buttons { bottom: 5px; } }
        .admin-action-btn { background: #7cba6e; border: none; padding: 6px 15px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.9rem; margin: 3px; }
        .char-canvas { width: 70px; height: 70px; margin: 0 auto; display: block; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div id="mainMenu" class="screen main-menu">
        <h1>🍭 AIR HOCKEY 🍬</h1>
        <div class="stats-panel">
            <div class="stat-item">💰 МОНЕТЫ: <span id="coinsDisplay">0</span></div>
            <div class="stat-item">⭐ ОБЩЕЕ ЭЛО: <span id="totalEloDisplay">0</span><span id="prestigeDisplay" class="prestige-badge" style="display:none;"></span></div>
        </div>
        <div class="mode-buttons">
            <button id="classicModeBtn" class="mode-btn active">🎮 КЛАССИЧЕСКИЙ</button>
            <button id="lineModeBtn" class="mode-btn">📏 НА ЛИНИИ</button>
        </div>
        <div class="menu-buttons">
            <button id="startMenuBtn" class="menu-btn">⚡ СТАРТ</button>
            <button id="shopMenuBtn" class="menu-btn">🛒 МАГАЗИН</button>
            <button id="titlesMenuBtn" class="menu-btn">🏆 ТИТУЛЫ</button>
            <button id="gloryMenuBtn" class="menu-btn">✨ ПУТЬ К СЛАВЕ</button>
            <button id="resetStatsMainBtn" class="reset-stats-btn">🔄 СБРОСИТЬ СТАТИСТИКУ</button>
            <button id="adminPanelBtn" class="admin-panel-btn">🔧 АДМИН-ПАНЕЛЬ</button>
        </div>
        <div id="adminPanel" class="admin-panel">
            <div class="admin-title">⚡ АДМИН-ПАНЕЛЬ ⚡</div>
            <div class="admin-buttons" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                <button id="adminPlus100Elo" class="admin-action-btn">+100 ЭЛО</button>
                <button id="adminPlus500Elo" class="admin-action-btn">+500 ЭЛО</button>
                <button id="adminPlus1000Elo" class="admin-action-btn">+1000 ЭЛО</button>
                <button id="adminMinusBtn" class="admin-action-btn">-100 ЭЛО</button>
                <button id="adminPlusCoins" class="admin-action-btn">+100 МОНЕТ</button>
                <button id="adminSafeExitBtn" class="admin-action-btn" style="background:#4c9a6e;">🔓 БЕЗОПАСНЫЙ ВЫХОД</button>
            </div>
            <button id="adminExitBtn" class="admin-exit-btn" style="background:#c06040; margin-top:10px; padding:5px 15px; border-radius:30px;">🚪 ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="charScreen" class="screen" style="display: none; padding: 20px;">
        <h2>✨ ВЫБЕРИ БОЙЦА ✨</h2>
        <div class="difficulty-buttons">
            <button id="easyBtn" class="difficulty-btn">🟢 ЛЕГКИЙ</button>
            <button id="mediumBtn" class="difficulty-btn active">🟡 СРЕДНИЙ</button>
            <button id="hardBtn" class="difficulty-btn">🔴 ТРУДНЫЙ</button>
        </div>
        <div class="chars-grid" id="charsGrid"></div>
        <button id="backToMainBtn" class="back-btn">🏠 В ГЛАВНОЕ МЕНЮ</button>
        <button id="startGameBtn" class="menu-btn" style="margin-top: 15px;">⚡ НАЧАТЬ ИГРУ</button>
    </div>

    <div id="shopScreen" class="screen" style="display: none; padding: 20px;">
        <h2>🛒 МАГАЗИН 🛒</h2>
        <div class="shop-items" id="shopItems"></div>
        <button id="backFromShopBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <div id="titlesScreen" class="screen" style="display: none; padding: 20px;">
        <h2>🏆 ТИТУЛЫ 🏆</h2>
        <div class="shop-items" id="titlesItems"></div>
        <button id="backFromTitlesBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <div id="gloryScreen" class="screen" style="display: none; padding: 20px;">
        <h2>✨ ПУТЬ К СЛАВЕ ✨</h2>
        <div style="font-size: 2rem; margin: 20px;">⭐ <span id="gloryElo">0</span> ЭЛО</div>
        <div style="font-size: 1.5rem;">💰 ДОСТУПНО МОНЕТ: <span id="gloryAvailable">0</span></div>
        <button id="collectCoinsBtn" class="collect-btn">💰 ЗАБРАТЬ МОНЕТЫ</button>
        <div class="stats-panel" style="margin-top: 20px;"><div class="stat-item">📊 50 ЭЛО = 1 МОНЕТА</div></div>
        <button id="backFromGloryBtn" class="back-btn">🏠 НАЗАД</button>
    </div>

    <div id="gameScreen" class="screen game-screen" style="display: none;">
        <div class="score-panel">
            <div class="score-box" id="playerScore">0</div>
            <div class="player-info"><span id="playerName"></span><span id="playerBuff" style="font-size:0.6rem;"></span></div>
            <div class="player-info"><span id="botName">БОТ</span><span id="botDifficulty"></span></div>
            <div class="score-box" id="botScore">0</div>
        </div>
        <canvas id="gameCanvas" width="650" height="850"></canvas>
        <div class="controls-info">⌨️ УПРАВЛЕНИЕ: МЫШКА / WASD / СТРЕЛКИ | R - ПИНОК | F - СДАТЬСЯ</div>
        <div class="game-buttons">
            <button id="exitGameBtn" class="exit-btn">🏳️ СДАТЬСЯ (F)</button>
            <button id="kickBtn" class="kick-btn">⚡ ПИНОК (R)</button>
            <button id="safeExitGameBtn" class="safe-exit-btn" style="display: none;">🚪 БЕЗ ПОТЕРИ</button>
        </div>
        <div id="resultPanel" class="result-panel">
            <div id="resultText" class="result-text"></div>
            <button id="nextBtn" class="menu-btn" style="margin-top: 10px;">✨ В ГЛАВНОЕ МЕНЮ ✨</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ДАННЫЕ (сокращённые для читаемости, но все функции сохранены)
        let coins = 0, ownedTitles = [], activeTitle = null, adminAuthenticated = false, safeExitUnlocked = false;
        let ratings = {0:0,1:0,2:0,3:0,4:0}, difficulty = 'medium', gameMode = 'classic', prestigeLevel = 0, prestigeBonus = 0, gorchitsaUnlocked = false, gonyaEffectUsed = false;
        const MAX_ELO = 2000, PRESTIGE_TARGET = 10000;
        const CHAR_BUFFS = {
            0:{ desc:"💪 +10% сила удара", powerBonus:1.1, hitboxBonus:1.0, special:null },
            1:{ desc:"🎯 +7% хитбокс", powerBonus:1.0, hitboxBonus:1.07, special:null },
            2:{ desc:"🍀 5% шанс 5:0", powerBonus:1.0, hitboxBonus:1.0, special:"gonya" },
            3:{ desc:"🛡️ 5% шанс спасти", powerBonus:1.0, hitboxBonus:1.0, special:"karamelka" },
            4:{ desc:"💪 +10% сила, 🎯 +5% хитбокс", powerBonus:1.1, hitboxBonus:1.05, special:null }
        };
        const BOT_BUFFS = { easy:{ powerBonus:0.9, hitboxBonus:0.95 }, medium:{ powerBonus:1.0, hitboxBonus:1.0 }, hard:{ powerBonus:1.15, hitboxBonus:1.07 } };
        
        let lastTimestamp = 0, baseEloPerGoal = { easy:10, medium:20, hard:35 };
        let keysPressed = { w:false, s:false, a:false, d:false, ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false };
        const GOAL_WIDTH = 240, LINE_GOAL_WIDTH = 650;
        function getGoalWidth() { return gameMode === 'line' ? LINE_GOAL_WIDTH : GOAL_WIDTH; }
        function getGoalX() { return (650 - getGoalWidth()) / 2; }
        
        function getTotalElo() { return ratings[0]+ratings[1]+ratings[2]+ratings[3]+ratings[4]; }
        function applyEloLimit() { for(let i=0;i<5;i++) { if(ratings[i]>MAX_ELO) ratings[i]=MAX_ELO; if(ratings[i]<0) ratings[i]=0; } }
        function getEloPerGoal() { let base = baseEloPerGoal[difficulty]; let elo = ratings[selectedChar]; if(elo>=1500) base=Math.floor(base*0.7); else if(elo>=1000) base=Math.floor(base*0.85); return base+prestigeBonus; }
        function getTitleBonusPerGoal() { return activeTitle==='prime'?5:0; }
        function getTitlePenaltyPerGoal() { return activeTitle==='prime'?-5:0; }
        
        function checkGorchitsaUnlock() { for(let i=0;i<4;i++) if(ratings[i]>=MAX_ELO && !gorchitsaUnlocked) { gorchitsaUnlocked=true; saveData(); alert("🌭 ГОРЧИЦА РАЗБЛОКИРОВАНА!"); renderCharacters(); } }
        function checkPrestige() { if(getTotalElo()>=PRESTIGE_TARGET) { prestigeLevel++; prestigeBonus+=5; for(let i=0;i<5;i++) ratings[i]=0; saveData(); updateStatsDisplay(); alert(`✨ ПРЕСТИЖ ${prestigeLevel}! +${prestigeBonus} ЭЛО/ГОЛ`); } }
        function checkGonyaEffect() { if(CHAR_BUFFS[selectedChar].special==='gonya' && !gonyaEffectUsed && Math.random()<0.05) { gonyaEffectUsed=true; playerScore=5; botScore=0; alert("🍀 ГОНЯ! ПОБЕДА 5:0!"); endGame(false,false); return true; } return false; }
        function checkKaramelkaSave() { return CHAR_BUFFS[selectedChar].special==='karamelka' && Math.random()<0.05; }
        function checkLudomanEffect() { if(activeTitle==='ludoman' && !ludomanUsed && Math.random()<0.1) { ludomanUsed=true; let win=Math.random()<0.5; playerScore=win?5:0; botScore=win?0:5; alert(win?"🎲 ЛУДОМАН! ПОБЕДА!":"🎲 ЛУДОМАН! ПОРАЖЕНИЕ!"); endGame(false,false); return true; } return false; }
        
        let ludomanUsed=false, surrenderPenalty={easy:-30,medium:-60,hard:-90}, drawPenalty=-20, winLimit=5;
        function calculateAvailableCoins() { return Math.max(0, Math.floor(getTotalElo()/50)-coins); }
        function collectCoins() { let av=calculateAvailableCoins(); if(av>0){ coins+=av; saveData(); updateStatsDisplay(); updateGloryDisplay(); alert(`💰 +${av} монет!`); } else alert("Нет монет!"); }
        function resetAllStats() { coins=0; ownedTitles=[]; activeTitle=null; ratings={0:0,1:0,2:0,3:0,4:0}; safeExitUnlocked=false; prestigeLevel=0; prestigeBonus=0; gorchitsaUnlocked=false; saveData(); updateStatsDisplay(); renderCharacters(); renderShop(); renderTitles(); alert("✅ Сброшено!"); }
        
        function loadData() { const saved=localStorage.getItem('ah_final'); if(saved){ try{ const d=JSON.parse(saved); coins=d.coins||0; ownedTitles=d.ownedTitles||[]; activeTitle=d.activeTitle||null; ratings=d.ratings||{0:0,1:0,2:0,3:0,4:0}; safeExitUnlocked=d.safeExitUnlocked||false; prestigeLevel=d.prestigeLevel||0; prestigeBonus=d.prestigeBonus||0; gorchitsaUnlocked=d.gorchitsaUnlocked||false; }catch(e){} } applyEloLimit(); updateStatsDisplay(); checkGorchitsaUnlock(); }
        function saveData() { localStorage.setItem('ah_final', JSON.stringify({coins, ownedTitles, activeTitle, ratings, safeExitUnlocked, prestigeLevel, prestigeBonus, gorchitsaUnlocked})); }
        function updateStatsDisplay() { document.getElementById('coinsDisplay').innerText=coins; let total=getTotalElo(); document.getElementById('totalEloDisplay').innerHTML=total; let span=document.getElementById('prestigeDisplay'); if(prestigeLevel>0){ span.style.display='inline-block'; span.innerHTML=`${prestigeLevel} престиж (+${prestigeBonus})`; } else span.style.display='none'; }
        function updateGloryDisplay() { document.getElementById('gloryElo').innerText=getTotalElo(); document.getElementById('gloryAvailable').innerText=calculateAvailableCoins(); }
        function addEloToChar(amount) { ratings[selectedChar]+=amount; applyEloLimit(); saveData(); updateStatsDisplay(); renderCharacters(); checkGorchitsaUnlock(); }
        function addCoins(amount) { coins+=amount; saveData(); updateStatsDisplay(); renderShop(); renderTitles(); }
        function sellTitle(titleId) { let price=(titleId==='prime'||titleId==='ludoman')?75:10; if(ownedTitles.includes(titleId)){ if(activeTitle===titleId) activeTitle=null; ownedTitles=ownedTitles.filter(t=>t!==titleId); coins+=price; saveData(); updateStatsDisplay(); renderShop(); renderTitles(); renderCharacters(); alert(`💰 Продано за ${price} монет!`); } else alert("Нет титула!"); }
        function deactivateTitle() { activeTitle=null; saveData(); renderTitles(); alert("🔓 Титул деактивирован!"); }
        
        function drawCharacter(ctx,x,y,c,hasBow){ const r=37; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=c; ctx.fill(); ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(x-11,y-8,7,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+11,y-8,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#2C2C2C"; ctx.beginPath(); ctx.arc(x-11,y-8,3.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+11,y-8,3.5,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#E87A5C"; ctx.beginPath(); ctx.ellipse(x,y+5,7,5,0,0,Math.PI*2); ctx.fill(); if(hasBow){ ctx.fillStyle="#FFB6C1"; ctx.beginPath(); ctx.ellipse(x,y-26,13,9,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(x-11,y-29,8,7,-0.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(x+11,y-29,8,7,0.5,0,Math.PI*2); ctx.fill(); } }
        function drawKorzhik(ctx,x,y){ drawCharacter(ctx,x,y,"#6CA6CD",false); }
        function drawKompot(ctx,x,y){ drawCharacter(ctx,x,y,"#6B8E23",true); }
        function drawGonya(ctx,x,y){ drawCharacter(ctx,x,y,"#808080",false); }
        function drawKaramelka(ctx,x,y){ drawCharacter(ctx,x,y,"#CD5C5C",true); }
        function drawGorchitsa(ctx,x,y){ drawCharacter(ctx,x,y,"#2C2C2C",false); }
        const drawFunctions=[drawKorzhik,drawKompot,drawGonya,drawKaramelka,drawGorchitsa];
        const charNames=["КОРЖИК","КОМПОТ","ГОНЯ","КАРАМЕЛЬКА","ГОРЧИЦА"];
        
        const screens={ main:document.getElementById('mainMenu'), char:document.getElementById('charScreen'), shop:document.getElementById('shopScreen'), titles:document.getElementById('titlesScreen'), glory:document.getElementById('gloryScreen'), game:document.getElementById('gameScreen') };
        const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d');
        let selectedChar=0, botChar=0, playerScore=0, botScore=0, gameActive=false, gameFinished=false, animationId=null, isRespawning=false, isExiting=false;
        const W=650, H=850, PADDLE_RADIUS=37, PUCK_RADIUS=21;
        const PLAYER_BOUNDS={ minX:20+PADDLE_RADIUS, maxX:W-20-PADDLE_RADIUS, minY:H/2+40, maxY:H-40 };
        const BOT_BOUNDS={ minX:20+PADDLE_RADIUS, maxX:W-20-PADDLE_RADIUS, minY:40, maxY:H/2-40 };
        let playerPaddle={ x:W/2, y:H-85 }, botPaddle={ x:W/2, y:85 }, mouseX=W/2, mouseY=H-85, puck={ x:W/2, y:H/2, vx:0, vy:0 };
        
        let baseBotSpeed={ easy:0.045, medium:0.09, hard:0.12 };
        function getBotSpeedMultiplier(){ let e=ratings[selectedChar]; if(e>=1500) return 2.5; if(e>=1000) return 1.8; return 1.0; }
        function getBotSpeed(){ let m=getBotSpeedMultiplier(); let e=(difficulty==='hard')?1.3:1; return baseBotSpeed[difficulty]*m*e; }
        function getBotErrorChance(){ let e=ratings[selectedChar]; let b={easy:0.25,medium:0.05,hard:0}[difficulty]; if(e>=1500&&difficulty==='hard') b=0.02; else if(e>=1000&&difficulty==='hard') b=0.05; return Math.min(0.4,Math.max(0,b)); }
        function getBotPowerBonus(){ return BOT_BUFFS[difficulty].powerBonus; }
        function getBotHitboxBonus(){ return BOT_BUFFS[difficulty].hitboxBonus; }
        
        function renderCharacters(){
            const grid=document.getElementById('charsGrid'); grid.innerHTML='';
            for(let i=0;i<5;i++){
                const isLocked=(i===4 && !gorchitsaUnlocked);
                const tempC=document.createElement('canvas'); tempC.width=80; tempC.height=80;
                drawFunctions[i](tempC.getContext('2d'),40,40);
                const div=document.createElement('div'); div.className='char'+(i===selectedChar?' selected':'')+(isLocked?' locked':'');
                let info='';
                if(i===selectedChar && !isLocked) info=`<div class="char-elo-info">📈 ${getEloPerGoal()} ЭЛО/ГОЛ</div>`;
                let lockText=isLocked?'<div class="char-buff" style="color:#ff8888;">🔒 2000 ЭЛО НА ЛЮБОМ</div>':`<div class="char-buff">${CHAR_BUFFS[i].desc}</div>`;
                div.innerHTML=`<canvas class="char-canvas" width="80" height="80"></canvas><div class="char-name">${charNames[i]}</div><div class="char-rating">⭐ ЭЛО: ${ratings[i]}</div>${lockText}${info}`;
                div.querySelector('canvas').getContext('2d').drawImage(tempC,0,0);
                if(!isLocked) div.onclick=(function(idx){ return function(){ selectedChar=idx; renderCharacters(); }; })(i);
                grid.appendChild(div);
            }
        }
        
        function updateSafeExitButton(){ document.getElementById('safeExitGameBtn').style.display=(safeExitUnlocked&&adminAuthenticated)?'block':'none'; }
        
        function startGame(){
            if(selectedChar===4 && !gorchitsaUnlocked){ alert("Горчица не разблокирована! Нужно 2000 ЭЛО на любом."); return; }
            gonyaEffectUsed=false; ludomanUsed=false;
            let avail=[]; for(let i=0;i<5;i++) if(i!==selectedChar && (i!==4||gorchitsaUnlocked)) avail.push(i);
            if(avail.length===0) avail=[0];
            botChar=avail[Math.floor(Math.random()*avail.length)];
            playerScore=0; botScore=0;
            document.getElementById('playerScore').innerText="0"; document.getElementById('botScore').innerText="0";
            document.getElementById('playerName').innerHTML=charNames[selectedChar];
            document.getElementById('playerBuff').innerHTML=CHAR_BUFFS[selectedChar].desc;
            document.getElementById('botName').innerHTML=charNames[botChar];
            document.getElementById('botDifficulty').innerHTML={easy:'🟢 ЛЕГКИЙ',medium:'🟡 СРЕДНИЙ',hard:'🔴 ТРУДНЫЙ'}[difficulty];
            updateSafeExitButton();
            screens.game.style.display='block'; screens.char.style.display='none';
            gameActive=true; gameFinished=false; isRespawning=false; isExiting=false;
            puck.x=W/2; puck.y=H/2; puck.vx=(Math.random()-0.5)*6; puck.vy=(Math.random()>0.5?5:-5);
            playerPaddle.x=W/2; playerPaddle.y=H-85; botPaddle.x=W/2; botPaddle.y=85;
            mouseX=W/2; mouseY=H-85; lastTimestamp=0;
            if(animationId) cancelAnimationFrame(animationId);
            animationId=requestAnimationFrame(gameLoop);
            setTimeout(()=>{ if(gameActive && !gameFinished && !isExiting){ if(!checkGonyaEffect()) checkLudomanEffect(); } },100);
        }
        
        function kickReset(){ if(gameActive && !gameFinished && !isRespawning && !isExiting){ puck.x=W/2; puck.y=H/2; puck.vx=(Math.random()-0.5)*7; puck.vy=(Math.random()-0.5)*7; } }
        
        function endGame(isSurrender,isSafeExit){
            gameFinished=true; gameActive=false; if(animationId) cancelAnimationFrame(animationId);
            let totalGain=0, msg="";
            if(isSafeExit && safeExitUnlocked && adminAuthenticated) msg=`🚪 БЕЗОПАСНЫЙ ВЫХОД 🚪<br>${playerScore}:${botScore}<br>⚡ 0 ЭЛО ⚡`;
            else if(isSurrender){ let p=surrenderPenalty[difficulty]; totalGain=p; ratings[selectedChar]+=p; applyEloLimit(); msg=`🏳️ СДАЧА! 🏳️<br>${playerScore}:${botScore}<br>${totalGain} ЭЛО`; saveData(); updateStatsDisplay(); renderCharacters(); }
            else if(playerScore===botScore){ totalGain=drawPenalty; ratings[selectedChar]+=totalGain; applyEloLimit(); msg=`🤝 НИЧЬЯ! 🤝<br>${playerScore}:${botScore}<br>${totalGain} ЭЛО`; saveData(); updateStatsDisplay(); renderCharacters(); }
            else{ let isWin=playerScore>botScore; let diff=playerScore-botScore; let base=diff*getEloPerGoal(); let bonus=playerScore*getTitleBonusPerGoal(); let pen=botScore*getTitlePenaltyPerGoal(); totalGain=base+bonus+pen; ratings[selectedChar]+=totalGain; applyEloLimit();
                if(isWin) msg=`🏆 ПОБЕДА! 🏆<br>${playerScore}:${botScore}<br>+${totalGain} ЭЛО`;
                else msg=`😭 ПОРАЖЕНИЕ... 😭<br>${playerScore}:${botScore}<br>${totalGain} ЭЛО`;
                saveData(); updateStatsDisplay(); renderCharacters(); checkPrestige(); checkGorchitsaUnlock();
            }
            document.getElementById('resultText').innerHTML=msg; document.getElementById('resultPanel').style.display='flex';
        }
        
        function surrender(){ if(!gameFinished && !isRespawning && !isExiting){ isExiting=true; endGame(true,false); } }
        function safeExit(){ if(!gameFinished && !isRespawning && !isExiting && safeExitUnlocked && adminAuthenticated){ isExiting=true; endGame(false,true); } }
        
        function scoreGoal(who){
            if(gameFinished || isRespawning || isExiting) return;
            if(who==='bot' && checkKaramelkaSave()){ alert("🛡️ КАРАМЕЛЬКА! ГОЛ НЕ ЗАСЧИТАН!"); return; }
            isRespawning=true; const flash=document.createElement('div'); flash.className='goal-flash'; document.getElementById('gameScreen').appendChild(flash); setTimeout(()=>flash.remove(),500);
            if(who==='player') playerScore++; else botScore++;
            document.getElementById('playerScore').innerText=playerScore; document.getElementById('botScore').innerText=botScore;
            if(playerScore>=winLimit || botScore>=winLimit){ endGame(false,false); return; }
            puck.vx=0; puck.vy=0;
            setTimeout(()=>{
                if(gameActive && !gameFinished && !isExiting){
                    if(who==='player'){ puck.x=botPaddle.x; puck.y=Math.max(PUCK_RADIUS+30,Math.min(H-PUCK_RADIUS-30,botPaddle.y+50)); puck.vx=(Math.random()-0.5)*5; puck.vy=5+Math.random()*2; }
                    else{ puck.x=playerPaddle.x; puck.y=Math.max(PUCK_RADIUS+30,Math.min(H-PUCK_RADIUS-30,playerPaddle.y-50)); puck.vx=(Math.random()-0.5)*5; puck.vy=-5-Math.random()*2; }
                    puck.x=Math.max(PUCK_RADIUS+10,Math.min(W-PUCK_RADIUS-10,puck.x)); isRespawning=false;
                }
            },500);
        }
        
        function updateBotAI(dt){
            if(!gameActive || gameFinished || isRespawning || isExiting) return;
            let tx=puck.x, ty=puck.y;
            if(gameMode==='line') ty=botPaddle.y;
            tx=Math.max(BOT_BOUNDS.minX+20,Math.min(BOT_BOUNDS.maxX-20,tx));
            ty=Math.max(BOT_BOUNDS.minY+20,Math.min(BOT_BOUNDS.maxY-20,ty));
            let dx=tx-botPaddle.x, dy=ty-botPaddle.y;
            if(Math.random()<getBotErrorChance()){ dx*=0.6+Math.random()*0.8; dy*=0.6+Math.random()*0.8; }
            let sp=getBotSpeed();
            botPaddle.x+=Math.min(8,Math.max(-8,dx*sp*(dt*60))); botPaddle.y+=Math.min(8,Math.max(-8,dy*sp*(dt*60)));
            botPaddle.x=Math.max(BOT_BOUNDS.minX,Math.min(BOT_BOUNDS.maxX,botPaddle.x));
            botPaddle.y=Math.max(BOT_BOUNDS.minY,Math.min(BOT_BOUNDS.maxY,botPaddle.y));
        }
        
        function updatePhysics(dt){
            if(!gameActive || gameFinished || isRespawning || isExiting) return;
            let pBonus=CHAR_BUFFS[selectedChar].powerBonus, hBonus=CHAR_BUFFS[selectedChar].hitboxBonus;
            let botPower=getBotPowerBonus(), botHitbox=getBotHitboxBonus();
            let curPaddle=PADDLE_RADIUS*hBonus, botCurPaddle=PADDLE_RADIUS*botHitbox;
            puck.x+=puck.vx*dt*65; puck.y+=puck.vy*dt*65;
            if(puck.x-PUCK_RADIUS<=2){ puck.x=PUCK_RADIUS+2; puck.vx=-puck.vx*0.98; }
            if(puck.x+PUCK_RADIUS>=W-2){ puck.x=W-PUCK_RADIUS-2; puck.vx=-puck.vx*0.98; }
            let gx=getGoalX(), gw=getGoalWidth();
            if(puck.y-PUCK_RADIUS<=0){ if(puck.x>=gx && puck.x<=gx+gw){ scoreGoal('player'); return; } else{ puck.y=PUCK_RADIUS; puck.vy=-puck.vy*0.95; } }
            if(puck.y+PUCK_RADIUS>=H){ if(puck.x>=gx && puck.x<=gx+gw){ scoreGoal('bot'); return; } else{ puck.y=H-PUCK_RADIUS; puck.vy=-puck.vy*0.95; } }
            const dx1=puck.x-playerPaddle.x, dy1=puck.y-playerPaddle.y;
            if(Math.hypot(dx1,dy1)<PUCK_RADIUS+curPaddle){
                const a=Math.atan2(dy1,dx1), s=Math.hypot(puck.vx,puck.vy);
                puck.vx=Math.cos(a)*Math.min(18,s+2.2)*1.25*pBonus; puck.vy=Math.sin(a)*Math.min(18,s+2.2)*1.25*pBonus;
                const ov=(PUCK_RADIUS+curPaddle)-Math.hypot(dx1,dy1); puck.x+=Math.cos(a)*ov; puck.y+=Math.sin(a)*ov;
            }
            const dx2=puck.x-botPaddle.x, dy2=puck.y-botPaddle.y;
            if(Math.hypot(dx2,dy2)<PUCK_RADIUS+botCurPaddle){
                const a=Math.atan2(dy2,dx2), s=Math.hypot(puck.vx,puck.vy);
                puck.vx=Math.cos(a)*Math.min(18,s+2.2)*1.25*botPower; puck.vy=Math.sin(a)*Math.min(18,s+2.2)*1.25*botPower;
                const ov=(PUCK_RADIUS+botCurPaddle)-Math.hypot(dx2,dy2); puck.x+=Math.cos(a)*ov; puck.y+=Math.sin(a)*ov;
            }
            puck.x=Math.max(PUCK_RADIUS+2,Math.min(W-PUCK_RADIUS-2,puck.x)); puck.y=Math.max(PUCK_RADIUS+2,Math.min(H-PUCK_RADIUS-2,puck.y));
            if(gameMode==='line'){ playerPaddle.x=mouseX; playerPaddle.y=H-85; playerPaddle.x=Math.max(PLAYER_BOUNDS.minX,Math.min(PLAYER_BOUNDS.maxX,playerPaddle.x)); }
            else{ playerPaddle.x=mouseX; playerPaddle.y=mouseY; playerPaddle.x=Math.max(PLAYER_BOUNDS.minX,Math.min(PLAYER_BOUNDS.maxX,playerPaddle.x)); playerPaddle.y=Math.max(PLAYER_BOUNDS.minY,Math.min(PLAYER_BOUNDS.maxY,playerPaddle.y)); }
        }
        
        function draw(){
            ctx.clearRect(0,0,W,H); ctx.fillStyle="#208a5e"; ctx.fillRect(0,0,W,H);
            ctx.beginPath(); ctx.strokeStyle="#ffefb0"; ctx.lineWidth=3; ctx.setLineDash([10,15]); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke(); ctx.setLineDash([]);
            ctx.beginPath(); ctx.arc(W/2,H/2,55,0,Math.PI*2); ctx.stroke();
            let gx=getGoalX(), gw=getGoalWidth();
            ctx.fillStyle="#4a2c14cc"; ctx.fillRect(gx,0,gw,22); ctx.fillStyle="#e6bc7e"; ctx.fillRect(gx+5,3,gw-10,16);
            ctx.fillStyle="#4a2c14cc"; ctx.fillRect(gx,H-22,gw,22); ctx.fillStyle="#e6bc7e"; ctx.fillRect(gx+5,H-19,gw-10,16);
            drawFunctions[selectedChar](ctx,playerPaddle.x,playerPaddle.y); drawFunctions[botChar](ctx,botPaddle.x,botPaddle.y);
            ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(puck.x,puck.y,PUCK_RADIUS,0,Math.PI*2); ctx.fillStyle="#2d2d2d"; ctx.fill(); ctx.fillStyle="#c0c0c0"; ctx.beginPath(); ctx.arc(puck.x-5,puck.y-4,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        }
        
        function gameLoop(timestamp){
            if(!gameActive || gameFinished || isExiting){ draw(); return; }
            if(lastTimestamp===0) lastTimestamp=timestamp;
            let dt=Math.min(0.033,(timestamp-lastTimestamp)/1000);
            lastTimestamp=timestamp; if(dt<0.005) dt=0.016;
            updateBotAI(dt); updatePhysics(dt); draw();
            animationId=requestAnimationFrame(gameLoop);
        }
        
        // КЛАВИАТУРА (РАБОТАЕТ)
        function updateKeyboardMovement(){
            let step=12;
            let nx=mouseX, ny=mouseY;
            if(keysPressed.w || keysPressed.ArrowUp) ny-=step;
            if(keysPressed.s || keysPressed.ArrowDown) ny+=step;
            if(keysPressed.a || keysPressed.ArrowLeft) nx-=step;
            if(keysPressed.d || keysPressed.ArrowRight) nx+=step;
            if(gameMode==='line') ny=H-85;
            mouseX=Math.max(PLAYER_BOUNDS.minX,Math.min(PLAYER_BOUNDS.maxX,nx));
            mouseY=Math.max(PLAYER_BOUNDS.minY,Math.min(PLAYER_BOUNDS.maxY,ny));
        }
        
        function handleKeyDown(e){
            const k=e.key;
            if(k==='w'||k==='W'||k==='ArrowUp'){ keysPressed.w=true; keysPressed.ArrowUp=true; e.preventDefault(); }
            if(k==='s'||k==='S'||k==='ArrowDown'){ keysPressed.s=true; keysPressed.ArrowDown=true; e.preventDefault(); }
            if(k==='a'||k==='A'||k==='ArrowLeft'){ keysPressed.a=true; keysPressed.ArrowLeft=true; e.preventDefault(); }
            if(k==='d'||k==='D'||k==='ArrowRight'){ keysPressed.d=true; keysPressed.ArrowRight=true; e.preventDefault(); }
            if(k==='r'||k==='R'){ kickReset(); e.preventDefault(); }
            if(k==='f'||k==='F'){ if(!gameFinished && !isExiting) surrender(); e.preventDefault(); }
        }
        function handleKeyUp(e){
            const k=e.key;
            if(k==='w'||k==='W'||k==='ArrowUp'){ keysPressed.w=false; keysPressed.ArrowUp=false; e.preventDefault(); }
            if(k==='s'||k==='S'||k==='ArrowDown'){ keysPressed.s=false; keysPressed.ArrowDown=false; e.preventDefault(); }
            if(k==='a'||k==='A'||k==='ArrowLeft'){ keysPressed.a=false; keysPressed.ArrowLeft=false; e.preventDefault(); }
            if(k==='d'||k==='D'||k==='ArrowRight'){ keysPressed.d=false; keysPressed.ArrowRight=false; e.preventDefault(); }
        }
        
        function handleMouseMove(e){
            if(!gameActive || gameFinished || isRespawning || isExiting) return;
            const rect=canvas.getBoundingClientRect(), sx=canvas.width/rect.width, sy=canvas.height/rect.height;
            let cx=e.clientX, cy=e.clientY;
            if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; e.preventDefault(); }
            let x=(cx-rect.left)*sx, y=(cy-rect.top)*sy;
            if(gameMode==='line') y=H-85;
            mouseX=Math.max(PLAYER_BOUNDS.minX,Math.min(PLAYER_BOUNDS.maxX,x));
            mouseY=Math.max(PLAYER_BOUNDS.minY,Math.min(PLAYER_BOUNDS.maxY,y));
        }
        
        function showScreen(id){ Object.values(screens).forEach(s=>s.style.display='none'); screens[id].style.display='block'; }
        
        function renderShop(){
            const cont=document.getElementById('shopItems');
            const pOwn=ownedTitles.includes('prime'), lOwn=ownedTitles.includes('ludoman');
            cont.innerHTML=`
                <div class="shop-item ${pOwn?'owned':''}"><div>🏆</div><div><strong>ТИТУЛ "НАСТОЯЩИЙ ЧЕМПИОН"</strong></div><div>+5 ЭЛО за гол, -5 за пропущенный</div><div>💰 75 МОНЕТ</div>${pOwn?'<div>✅ КУПЛЕНО</div>':'<button class="buy-btn prime">КУПИТЬ</button>'}</div>
                <div class="shop-item ${lOwn?'owned':''}"><div>🎲</div><div><strong>ТИТУЛ "ЛУДОМАН"</strong></div><div>10% шанс 5:0 в начале</div><div>💰 75 МОНЕТ</div>${lOwn?'<div>✅ КУПЛЕНО</div>':'<button class="buy-btn ludoman">КУПИТЬ</button>'}</div>`;
            const pBtn=cont.querySelector('.buy-btn.prime');
            if(pBtn) pBtn.onclick=()=>{ if(coins>=75 && !ownedTitles.includes('prime')){ coins-=75; ownedTitles.push('prime'); saveData(); updateStatsDisplay(); renderShop(); renderTitles(); renderCharacters(); alert('🎉 Титул куплен!'); } else alert('Недостаточно монет!'); };
            const lBtn=cont.querySelector('.buy-btn.ludoman');
            if(lBtn) lBtn.onclick=()=>{ if(coins>=75 && !ownedTitles.includes('ludoman')){ coins-=75; ownedTitles.push('ludoman'); saveData(); updateStatsDisplay(); renderShop(); renderTitles(); renderCharacters(); alert('🎲 Титул куплен!'); } else alert('Недостаточно монет!'); };
        }
        
        function renderTitles(){
            const cont=document.getElementById('titlesItems');
            const list=ownedTitles.filter(t=>t!=='gorchitsa');
            if(!list.length){ cont.innerHTML='<div style="padding:20px;">😢 Нет титулов</div>'; return; }
            cont.innerHTML=list.map(t=>{
                let name=t==='prime'?'НАСТОЯЩИЙ ЧЕМПИОН':'ЛУДОМАН', desc=t==='prime'?'+5/-5 ЭЛО':'10% шанс 5:0';
                return `<div class="shop-item ${activeTitle===t?'active-title':''}">
                    <div>${t==='prime'?'🏆':'🎲'}</div>
                    <div><strong>${name}</strong></div>
                    <div>${desc}</div>
                    <div class="title-actions">
                        <button class="apply-title-btn">${activeTitle===t?'✅ АКТИВЕН':'🔹 ПРИМЕНИТЬ'}</button>
                        <button class="sell-btn" data-title="${t}">💰 ПРОДАТЬ</button>
                        ${activeTitle===t?'<button class="deactivate-btn">🔓 ДЕАКТИВИРОВАТЬ</button>':''}
                    </div>
                </div>`;
            }).join('');
            cont.querySelectorAll('.apply-title-btn').forEach((btn,i)=>{ let t=list[i]; btn.onclick=()=>{ activeTitle=t; saveData(); renderTitles(); alert(`🏆 Титул "${t==='prime'?'НАСТОЯЩИЙ ЧЕМПИОН':'ЛУДОМАН'}" активирован!`); }; });
            cont.querySelectorAll('.sell-btn').forEach(btn=>{ btn.onclick=()=>{ sellTitle(btn.dataset.title); }; });
            cont.querySelectorAll('.deactivate-btn').forEach(btn=>{ btn.onclick=()=>{ deactivateTitle(); }; });
        }
        
        function updateGlory(){ updateGloryDisplay(); }
        function showAdminAuth(){ let p=prompt("Пароль:"); if(p==="838995"){ adminAuthenticated=true; document.getElementById('adminPanel').classList.add('show'); updateSafeExitButton(); } else alert("Неверный пароль!"); }
        function closeAdminPanel(){ adminAuthenticated=false; document.getElementById('adminPanel').classList.remove('show'); updateSafeExitButton(); }
        function unlockSafeExit(){ safeExitUnlocked=true; saveData(); updateSafeExitButton(); alert("✅ Безопасный выход разблокирован!"); }
        function setGameMode(mode){ gameMode=mode; document.getElementById('classicModeBtn').classList.remove('active'); document.getElementById('lineModeBtn').classList.remove('active'); if(mode==='classic') document.getElementById('classicModeBtn').classList.add('active'); else document.getElementById('lineModeBtn').classList.add('active'); }
        
        function animateMovement(){ if(gameActive && !gameFinished && !isRespawning && !isExiting) updateKeyboardMovement(); requestAnimationFrame(animateMovement); }
        
        document.getElementById('startMenuBtn').onclick=()=>{ renderCharacters(); showScreen('char'); };
        document.getElementById('shopMenuBtn').onclick=()=>{ renderShop(); showScreen('shop'); };
        document.getElementById('titlesMenuBtn').onclick=()=>{ renderTitles(); showScreen('titles'); };
        document.getElementById('gloryMenuBtn').onclick=()=>{ updateGlory(); showScreen('glory'); };
        document.getElementById('resetStatsMainBtn').onclick=()=>{ if(confirm("Сбросить всё?")) resetAllStats(); };
        document.getElementById('adminPanelBtn').onclick=showAdminAuth;
        document.getElementById('adminPlus100Elo').onclick=()=>{ if(adminAuthenticated) addEloToChar(100); };
        document.getElementById('adminPlus500Elo').onclick=()=>{ if(adminAuthenticated) addEloToChar(500); };
        document.getElementById('adminPlus1000Elo').onclick=()=>{ if(adminAuthenticated) addEloToChar(1000); };
        document.getElementById('adminMinusBtn').onclick=()=>{ if(adminAuthenticated) addEloToChar(-100); };
        document.getElementById('adminPlusCoins').onclick=()=>{ if(adminAuthenticated) addCoins(100); };
        document.getElementById('adminSafeExitBtn').onclick=()=>{ if(adminAuthenticated) unlockSafeExit(); };
        document.getElementById('adminExitBtn').onclick=closeAdminPanel;
        document.getElementById('backToMainBtn').onclick=()=>showScreen('main');
        document.getElementById('backFromShopBtn').onclick=()=>showScreen('main');
        document.getElementById('backFromTitlesBtn').onclick=()=>showScreen('main');
        document.getElementById('backFromGloryBtn').onclick=()=>showScreen('main');
        document.getElementById('collectCoinsBtn').onclick=collectCoins;
        document.getElementById('startGameBtn').onclick=startGame;
        document.getElementById('exitGameBtn').onclick=()=>{ if(!gameFinished && !isExiting) surrender(); };
        document.getElementById('safeExitGameBtn').onclick=()=>{ if(!gameFinished && !isExiting) safeExit(); };
        document.getElementById('kickBtn').onclick=()=>{ if(gameActive && !gameFinished && !isRespawning && !isExiting) kickReset(); };
        document.getElementById('nextBtn').onclick=()=>{ document.getElementById('resultPanel').style.display='none'; showScreen('main'); };
        document.getElementById('easyBtn').onclick=()=>{ difficulty='easy'; document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active')); document.getElementById('easyBtn').classList.add('active'); renderCharacters(); };
        document.getElementById('mediumBtn').onclick=()=>{ difficulty='medium'; document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active')); document.getElementById('mediumBtn').classList.add('active'); renderCharacters(); };
        document.getElementById('hardBtn').onclick=()=>{ difficulty='hard'; document.querySelectorAll('.difficulty-btn').forEach(b=>b.classList.remove('active')); document.getElementById('hardBtn').classList.add('active'); renderCharacters(); };
        document.getElementById('classicModeBtn').onclick=()=>{ setGameMode('classic'); };
        document.getElementById('lineModeBtn').onclick=()=>{ setGameMode('line'); };
        
        canvas.addEventListener('mousemove',handleMouseMove);
        canvas.addEventListener('touchmove',handleMouseMove,{passive:false});
        window.addEventListener('keydown',handleKeyDown);
        window.addEventListener('keyup',handleKeyUp);
        canvas.width=W; canvas.height=H;
        loadData(); renderCharacters(); showScreen('main');
        animateMovement();
    })();
</script>
